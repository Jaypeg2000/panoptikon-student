<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PANOPTIKON // STUDENT NODE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --red: #cc1111; --red-bright: #ff1a1a; --font: 'Share Tech Mono', monospace; --display: 'VT323', monospace; }
html, body { width:100%; height:100%; background:#000; color:#fff; font-family:var(--font); overflow:hidden; touch-action:manipulation; }
body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px); pointer-events:none; z-index:100; }
.screen { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; transition:opacity 0.4s; }
.screen.hidden { opacity:0; pointer-events:none; }

/* STANDBY */
#standby { background:#000; gap:18px; text-align:center; }
.node-id { font-family:var(--display); font-size:12px; letter-spacing:0.3em; color:#252525; position:absolute; top:14px; left:50%; transform:translateX(-50%); white-space:nowrap; }
.status-ring { width:76px; height:76px; border-radius:50%; border:1px solid #181818; display:flex; align-items:center; justify-content:center; }
.status-dot { width:10px; height:10px; border-radius:50%; background:#1e1e1e; transition:background 0.5s, box-shadow 0.5s; }
.status-dot.armed { background:#8b0000; box-shadow:0 0 12px #8b0000,0 0 24px #4a0000; animation:pulse-red 2s ease-in-out infinite; }
@keyframes pulse-red { 0%,100%{box-shadow:0 0 8px #8b0000,0 0 16px #4a0000} 50%{box-shadow:0 0 18px #cc0000,0 0 36px #8b0000} }
.status-label { font-size:9px; letter-spacing:0.25em; color:#666; }
.status-label.armed { color:#8b0000; }
.divider-line { width:36px; height:1px; background:#141414; }
.countdown-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; }
.countdown-num { font-family:var(--display); font-size:52px; color:#666; line-height:1; letter-spacing:0.05em; transition:color 0.5s; }
.countdown-num.armed { color:#5a0000; }
.countdown-lbl { font-size:8px; letter-spacing:0.3em; color:#1e1e1e; }
.next-check { font-size:9px; letter-spacing:0.12em; color:#222; text-align:center; line-height:1.9; }
.next-check span { color:#383838; }
.connected-badge { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-size:8px; letter-spacing:0.18em; color:#1e1e1e; white-space:nowrap; display:flex; align-items:center; gap:6px; }
.conn-dot { width:5px; height:5px; border-radius:50%; background:#1a1a1a; transition:background 0.4s; }
.conn-dot.online { background:#1a3a1a; box-shadow:0 0 5px #1a3a1a; }

/* TASK */
#task { background:var(--red); gap:0; text-align:center; }
.task-header { position:absolute; top:0; left:0; right:0; padding:12px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid rgba(0,0,0,0.15); }
.task-sys { font-size:9px; letter-spacing:0.25em; color:rgba(0,0,0,0.4); }
.task-timer { font-family:var(--display); font-size:22px; color:#000; }
.task-body { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px 28px 80px; width:100%; }
.task-label { font-size:9px; letter-spacing:0.35em; color:rgba(0,0,0,0.45); }
.task-text { font-family:var(--display); font-size:clamp(26px,6.5vw,40px); color:#000; line-height:1.25; letter-spacing:0.02em; max-width:440px; animation:task-in 0.3s ease-out; }
@keyframes task-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.task-progress { position:absolute; bottom:0; left:0; height:4px; background:rgba(0,0,0,0.25); transition:width 1s linear; }
.task-footer { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:0.2em; color:rgba(0,0,0,0.3); white-space:nowrap; }

/* FLASH */
#flash { position:fixed; inset:0; background:var(--red-bright); opacity:0; pointer-events:none; z-index:200; }
#flash.go { animation:flash-anim 0.7s ease-out forwards; }
@keyframes flash-anim { 0%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>

<div id="flash"></div>

<div class="screen" id="standby">
  <div class="node-id">PANOPTIKON/2 &nbsp;·&nbsp; STUDENT NODE</div>
  <div class="status-ring"><div class="status-dot" id="statusDot"></div></div>
  <div class="status-label" id="statusLabel">STANDBY</div>
  <div class="divider-line"></div>
  <div class="countdown-wrap">
    <div class="countdown-num" id="countdownNum">–:––</div>
    <div class="countdown-lbl" id="countdownLbl">UNTIL ARMED</div>
  </div>
  <div class="divider-line"></div>
  <div class="next-check" id="nextCheckTxt">AWAITING START SIGNAL<br><span>CONNECT TO CLASS NETWORK</span></div>
  <div class="connected-badge"><div class="conn-dot" id="connDot"></div><span id="connLabel">CONNECTING…</span></div>
</div>

<div class="screen hidden" id="task">
  <div class="task-header">
    <span class="task-sys">PANOPTIKON/2 // TASK ASSIGNED</span>
    <span class="task-timer" id="taskTimer">1:00</span>
  </div>
  <div class="task-body">
    <div class="task-label">ASSIGNED TASK</div>
    <div class="task-text" id="taskText">–</div>
  </div>
  <div class="task-progress" id="taskProgress" style="width:100%"></div>
  <div class="task-footer">COMPLETE BEFORE TIMER EXPIRES</div>
</div>

<script>
// ── INLINE MQTT CLIENT (no CDN) ────────────────────────────────────────────
// Minimal MQTT 3.1.1 over WebSocket — CONNECT, SUBSCRIBE, PUBLISH, PINGREQ/RESP

  _connect() {
    if (this._dead) return;
    try {
      this._ws = new WebSocket(this._url, ['mqtt']);
      this._ws.binaryType = 'arraybuffer';
      this._ws.onopen    = () => this._onOpen();
      this._ws.onmessage = e => this._onData(new Uint8Array(e.data));
      this._ws.onerror   = () => this._scheduleReconnect();
      this._ws.onclose   = () => this._scheduleReconnect();
    } catch(e) { this._scheduleReconnect(); }
  }

  _scheduleReconnect() {
    clearTimeout(this._reconnectTimer);
    if (this._dead) return;
    this._onError();
    this._reconnectTimer = setTimeout(() => this._connect(), 4000);
  }

  // Build MQTT CONNECT packet
  _onOpen() {
    const id   = this._clientId;
    const idB  = this._str(id);
    const proto = this._str('MQTT');
    // Fixed header + variable header
    const varH = new Uint8Array([
      ...proto,        // Protocol Name
      4,               // Protocol Level (3.1.1)
      2,               // Connect Flags: Clean Session
      0, 60,           // Keep Alive: 60s
    ]);
    const payload = new Uint8Array(idB);
    const varLen  = varH.length + payload.length;
    const pkt     = new Uint8Array([0x10, ...this._varInt(varLen), ...varH, ...payload]);
    this._ws.send(pkt);
  }

  // Encode string as [MSB, LSB, ...bytes]
  _str(s) {
    const b = new TextEncoder().encode(s);
    return [b.length >> 8, b.length & 0xff, ...b];
  }

  _varInt(n) {
    const out = [];
    do { let b = n & 0x7f; n >>= 7; if (n > 0) b |= 0x80; out.push(b); } while (n > 0);
    return out;
  }

  _onData(chunk) {
    // Append chunk to buffer
    const merged = new Uint8Array(this._buf.length + chunk.length);
    merged.set(this._buf); merged.set(chunk, this._buf.length);
    this._buf = merged;

    while (this._buf.length >= 2) {
      const type = (this._buf[0] >> 4);
      // Decode remaining length
      let mul = 1, rl = 0, i = 1;
      do { if (i >= this._buf.length) return; rl += (this._buf[i] & 0x7f) * mul; mul *= 128; } while (this._buf[i++] & 0x80);
      const total = i + rl;
      if (this._buf.length < total) return;

      const pkt = this._buf.slice(0, total);
      this._buf = this._buf.slice(total);

      if (type === 2) { // CONNACK
        this._onConnect();
        // Start ping every 50s
        this._pingTimer = setInterval(() => this._ping(), 50000);
      } else if (type === 3) { // PUBLISH
        this._handlePublish(pkt, i);
      } else if (type === 13) { // PINGRESP — ignore
      }
    }
  }

  _handlePublish(pkt, hdrLen) {
    // Topic length
    const tLen = (pkt[hdrLen] << 8) | pkt[hdrLen + 1];
    const topic = new TextDecoder().decode(pkt.slice(hdrLen + 2, hdrLen + 2 + tLen));
    const qos   = (pkt[0] & 0x06) >> 1;
    const payloadStart = hdrLen + 2 + tLen + (qos > 0 ? 2 : 0);
    const payload = new TextDecoder().decode(pkt.slice(payloadStart));
    const cbs = this._subs[topic] || [];
    // Wildcard match (#)
    for (const [t, cbArr] of Object.entries(this._subs)) {
      if (t === topic || (t.endsWith('#') && topic.startsWith(t.slice(0,-1)))) {
        cbArr.forEach(cb => cb(topic, payload));
      }
    }
  }

  subscribe(topic, cb) {
    if (!this._subs[topic]) this._subs[topic] = [];
    this._subs[topic].push(cb);
    // Send SUBSCRIBE packet (QoS 0)
    const topicB = this._str(topic);
    const varH   = [0x00, 0x01, ...topicB, 0x00]; // packet id=1, qos=0
    this._ws?.readyState === 1 && this._ws.send(new Uint8Array([0x82, ...this._varInt(varH.length), ...varH]));
  }

  publish(topic, payload) {
    if (this._ws?.readyState !== 1) return;
    const tB = this._str(topic);
    const pB = new TextEncoder().encode(payload);
    const varLen = tB.length + pB.length;
    this._ws.send(new Uint8Array([0x30, ...this._varInt(varLen), ...tB, ...pB]));
  }

  _ping() {
    this._ws?.readyState === 1 && this._ws.send(new Uint8Array([0xc0, 0x00]));
  }

  destroy() { this._dead = true; clearInterval(this._pingTimer); clearTimeout(this._reconnectTimer); this._ws?.close(); }
}


const TASKS = [
  "Draw a silly dog in your book. Show it to the person infront or behind you, if you wish",
  "Start doomscrolling. At least 20 insta reels or such.",
  "Think of one real-world example of what was just explained in the short film.",
  "Come to front of the class to be surveilled. Remember to smile!",
  "Take a selfie, with flash",
  "Ask someone for money.",
  "Put headphones in.",
  "Draw a square, preferably with a ruler.",
  "Get into an argument with the person next to you, or give an attempt to.",
  "Look directly at David Shea for 10-20 seconds.",
  "Start conversation on a really touchy subject out of nowhere.",
  "Swap devices with someone else who has a red screen/task."
  "Change seats.",
  "Ask to swap seats with someone.",
  "Move to the front of the class.",
  "Come to the front and start presenting. If you have anxiety, you don't have to do this.",
  "Sit on your chair backwards.".
  "Take the note in your book/on your computer 'watch twin peaks'",
  "Cough. Really loudly.",
  "If you have any food, start eating it.",
  "Take notes on the presentation.",
  "Open the palantir website.",
  "Open the unimelb free speech declaration.",
  "Leave the room and re-enter from another door",
  "Stand up, then sit back down again.",
  "Tap someones shoulder, then act like you didn't."
];

// ── STATE ──────────────────────────────────────────────────────────────────
let mqtt, started=false, armed=false, taskActive=false;
let startTime=null, armDelay=120, nextCheckIn=0, taskCountdown=60;
let countdownTimer=null, taskIntervalId=null, checkIntervalId=null;
const TASK_DURATION=60, CHECK_EVERY=60, let currentTaskChance = 0.15;
const TASK_CHANCE_INCREMENT = 0.15;
const MAX_TASK_CHANCE = 1.0;

// ── AUDIO ──────────────────────────────────────────────────────────────────
let audioCtx = null;
function ac() { return audioCtx || (audioCtx = new (window.AudioContext||window.webkitAudioContext)()); }

function playDiscordPop() {
  const ctx=ac(), o=ctx.createOscillator(), g=ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  const t=ctx.currentTime;
  o.type='sine';
  o.frequency.setValueAtTime(400,t);
  o.frequency.exponentialRampToValueAtTime(900,t+0.08);
  o.frequency.exponentialRampToValueAtTime(700,t+0.18);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.5,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o.start(t); o.stop(t+0.4);
}

function playTriTone() {
  const ctx=ac();
  [0,0.22,0.44].forEach((off,i)=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    const t=ctx.currentTime+off, f=[1046,1318,1568][i];
    o.type='sine'; o.frequency.setValueAtTime(f,t);
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.35,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    o.start(t); o.stop(t+0.2);
  });
}

function playTaskSound() { playDiscordPop(); setTimeout(playTriTone, 220); }

// ── MQTT ──────────────────────────────────────────────────────────────────
function connectMQTT() {
  mqtt = new MicroMQTT(BROKER, {
    clientId: 'student_' + Math.random().toString(36).slice(2,9),
    onConnect: () => {
      setConn(true);
      mqtt.subscribe(TOPIC_CMD, handleCmd);
      mqtt.publish(TOPIC_HB, JSON.stringify({ type:'join', room:ROOM }));
      setInterval(() => mqtt.publish(TOPIC_HB, JSON.stringify({ type:'hb', room:ROOM })), 30000);
    },
    onError: () => setConn(false),
  });
}

function handleCmd(topic, raw) {
  let msg; try { msg = JSON.parse(raw); } catch { return; }
  if (msg.type==='start') {
  teacherConnected = true;

  if (!started) {
    beginCountdown(
      typeof msg.delaySeconds==='number'
        ? msg.delaySeconds
        : 120
    );
  }
}
  if (msg.type==='task' && armed && !taskActive) showTask(msg.task || randomTask());
  if (msg.type==='reset') resetAll();
}

function setConn(on) {
  document.getElementById('connDot').className = 'conn-dot'+(on?' online':'');
  document.getElementById('connLabel').textContent = on ? `ROOM: ${ROOM.toUpperCase()}` : 'OFFLINE — RETRYING';
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────
function beginCountdown(delaySecs) {
  if (started) return;
  started=true; armDelay=delaySecs; startTime=Date.now(); nextCheckIn=CHECK_EVERY;
  document.getElementById('nextCheckTxt').textContent = 'ARMING IN PROGRESS…';
  countdownTimer = setInterval(() => {
    const rem = Math.max(0, armDelay - (Date.now()-startTime)/1000);
    const m=Math.floor(rem/60), s=Math.floor(rem%60);
    document.getElementById('countdownNum').textContent = `${m}:${String(s).padStart(2,'0')}`;
    document.getElementById('countdownLbl').textContent = 'UNTIL ARMED';
    if (rem<=0) { clearInterval(countdownTimer); arm(); }
  }, 500);
}

function arm() {
  armed=true;
  document.getElementById('statusDot').className   = 'status-dot armed';
  document.getElementById('statusLabel').className = 'status-label armed';
  document.getElementById('statusLabel').textContent = 'ARMED';
  document.getElementById('countdownNum').className  = 'countdown-num armed';
  nextCheckIn=CHECK_EVERY; updateNextCheck();
  checkIntervalId = setInterval(doCheck, 1000);
}

function doCheck() {
  if (taskActive) return;

  nextCheckIn = Math.max(0, nextCheckIn - 1);
  updateNextCheck();

  if (nextCheckIn <= 0) {
    nextCheckIn = CHECK_EVERY;

    if (Math.random() < currentTaskChance) {

      // TASK TRIGGERED
      showTask(randomTask());

      // Reset chance after activation
      currentTaskChance = 0.15;

    } else {

      // Increase chance after failed roll
      currentTaskChance = Math.min(
        currentTaskChance + TASK_CHANCE_INCREMENT,
        MAX_TASK_CHANCE
      );

    }

    console.log(
      `Current task chance: ${Math.round(currentTaskChance * 100)}%`
    );
  }
}

function updateNextCheck() {
  const m=Math.floor(nextCheckIn/60), s=nextCheckIn%60;
  document.getElementById('countdownNum').textContent = `${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('countdownLbl').textContent = 'NEXT CHECK';
  document.getElementById('nextCheckTxt').innerHTML = `SYSTEM ARMED · ${Math.round(currentTaskChance * 100)}% TASK CHANCE<br><span>PER 60s CHECK</span>`;
}

// ── TASK ──────────────────────────────────────────────────────────────────
function randomTask() { return TASKS[Math.floor(Math.random()*TASKS.length)]; }

function showTask(text) {
  if (taskActive) return;
  taskActive=true; taskCountdown=TASK_DURATION;
  playTaskSound();
  const fl=document.getElementById('flash');
  fl.classList.remove('go'); void fl.offsetWidth; fl.classList.add('go');
  document.getElementById('standby').classList.add('hidden');
  document.getElementById('task').classList.remove('hidden');
  document.getElementById('taskText').textContent = text;
  document.getElementById('taskProgress').style.width = '100%';
  document.getElementById('taskTimer').textContent = '1:00';
  taskIntervalId = setInterval(() => {
    taskCountdown--;
    document.getElementById('taskProgress').style.width = (taskCountdown/TASK_DURATION*100)+'%';
    const m=Math.floor(taskCountdown/60), s=taskCountdown%60;
    document.getElementById('taskTimer').textContent = `${m}:${String(s).padStart(2,'0')}`;
    if (taskCountdown<=0) { clearInterval(taskIntervalId); endTask(); }
  }, 1000);
}

function endTask() {
  taskActive=false;
  document.getElementById('task').classList.add('hidden');
  document.getElementById('standby').classList.remove('hidden');
  nextCheckIn=CHECK_EVERY;
}

function resetAll() {
  clearInterval(countdownTimer); clearInterval(checkIntervalId); clearInterval(taskIntervalId);
  started=false; armed=false; taskActive=false;
  document.getElementById('task').classList.add('hidden');
  document.getElementById('standby').classList.remove('hidden');
  document.getElementById('statusDot').className   = 'status-dot';
  document.getElementById('statusLabel').className = 'status-label';
  document.getElementById('statusLabel').textContent = 'STANDBY';
  document.getElementById('countdownNum').className  = 'countdown-num';
  document.getElementById('countdownNum').textContent = '–:––';
  document.getElementById('nextCheckTxt').innerHTML = 'AWAITING START SIGNAL<br><span>CONNECT TO CLASS NETWORK</span>';
}

// ── AUTONOMOUS START ─────────────────────────

document.getElementById('nextCheckTxt').innerHTML =
  'SYSTEM INITIALISING<br><span>OBSERVATION ENGINE STANDBY</span>';

let autoIn = 120;

const startupInterval = setInterval(() => {

  autoIn--;

  const m = Math.floor(autoIn / 60);
  const s = autoIn % 60;

  document.getElementById('countdownNum').textContent =
    `${m}:${String(s).padStart(2,'0')}`;

  document.getElementById('countdownLbl').textContent =
    'UNTIL ARMED';

  if (autoIn <= 0) {

    clearInterval(startupInterval);

    beginCountdown(0);
  }

}, 1000);
  
// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('touchstart', ()=>{ try{ac().resume()}catch(e){} }, {once:true});
document.addEventListener('click',      ()=>{ try{ac().resume()}catch(e){} }, {once:true});

</script>
</body>
</html>
